name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Select release type'
        required: true
        type: choice
        options:
          - Development
          - Hotfix
          - Minor Release
          - Major Release
        default: 'Development'

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Bump version on release branch
        id: version
        run: |
          BASE_BRANCH="${GITHUB_REF_NAME}"
          RELEASE_BRANCH="release/${{ github.run_id }}-${{ github.run_attempt }}"

          case "${{ github.event.inputs.release_type }}" in
            "Development")
              VERSION=$(uv run semantic-release version --print-last-released | tail -1)
              if [[ "$VERSION" == *dev* ]]; then
                uv run semantic-release version --prerelease --prerelease-token dev --no-changelog --no-push --no-vcs-release
              else
                uv run semantic-release version --as-prerelease --patch --prerelease-token dev --no-changelog --no-push --no-vcs-release
              fi
              ;;
            "Major Release")
              uv run semantic-release version --major --no-changelog --no-push --no-vcs-release
              ;;
            "Minor Release")
              uv run semantic-release version --minor --no-changelog --no-push --no-vcs-release
              ;;
            "Hotfix")
              # Remove local dev tags to ensure patch increments from last stable release
              git tag -d $(git tag -l | grep -E "dev") 2>/dev/null || true
              uv run semantic-release version --patch --no-changelog --no-push --no-vcs-release
              ;;
          esac

          RELEASE_TAG=$(git tag --points-at HEAD | sort -V | tail -1)
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "semantic-release did not create a release tag" >&2
            exit 1
          fi

          RELEASE_TYPE_SLUG=$(echo "${{ github.event.inputs.release_type }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')

          git push origin "HEAD:$RELEASE_BRANCH"

          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_type_slug=$RELEASE_TYPE_SLUG" >> "$GITHUB_OUTPUT"

      - name: Create release PR
        id: release-pr
        run: |
          RELEASE_LABEL="automated-release"
          RELEASE_TYPE_LABEL="release-type:${{ steps.version.outputs.release_type_slug }}"

          gh label create "$RELEASE_LABEL" \
            --description "Release PRs created by the release workflow" \
            --color 0E8A16 \
            --force
          gh label create "$RELEASE_TYPE_LABEL" \
            --description "Release type for automated release PRs" \
            --color 1D76DB \
            --force
          PR_ARGS=(
            --base "${{ steps.version.outputs.base_branch }}"
            --head "${{ steps.version.outputs.release_branch }}"
            --title "chore(release): ${{ steps.version.outputs.release_tag }}"
            --body "Automated ${{ github.event.inputs.release_type }} version bump."
            --label "$RELEASE_LABEL"
            --label "$RELEASE_TYPE_LABEL"
          )

          PR_URL=$(gh pr create "${PR_ARGS[@]}")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
